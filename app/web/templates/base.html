<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduPrompt Platform{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('main.static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        function renderMarkdown(text) {
            return DOMPurify.sanitize(marked.parse(text || ''));
        }
        function renderMermaidBlocks(container) {
            container.querySelectorAll('code.language-mermaid').forEach(function(el) {
                var pre = el.parentElement;
                var div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = el.textContent;
                pre.replaceWith(div);
            });
            mermaid.run();
        }
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="{{ url_for('main.home') }}" class="logo">&#127891; EduPrompt Platform</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>EduPrompt Platform &mdash; Plataforma educacional com IA personalizada</p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
