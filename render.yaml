services:
  - type: web
    name: edu-prompt-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app.web.app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
